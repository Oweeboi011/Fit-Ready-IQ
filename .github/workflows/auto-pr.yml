name: Auto PR — develop to main

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    name: Create or update PR
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - name: Check commits ahead of main
        id: ahead
        run: |
          git fetch origin main
          COUNT=$(git rev-list --count origin/main..origin/develop)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Create PR if needed
        if: steps.ahead.outputs.count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Bail if a PR from develop→main already exists
          EXISTING=$(gh pr list \
            --base main --head develop \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — skipping"
            exit 0
          fi

          COMMITS=$(git log --oneline origin/main..origin/develop | head -20)

          BODY="## Auto-generated release PR

All CI checks passed on \`develop\`. Created automatically.

### Included commits
\`\`\`
${COMMITS}
\`\`\`

### Gate checklist
- [ ] E2E tests pass
- [ ] Mutation score ≥ 60 % (if \`src/lib/\` changed)
- [ ] Security scan clean
- [ ] AI review addressed
- [ ] No unresolved review threads"

          gh pr create \
            --base main \
            --head develop \
            --title "chore: release develop → main" \
            --body "$BODY"
