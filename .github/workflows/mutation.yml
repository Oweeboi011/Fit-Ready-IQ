name: Mutation Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/src/lib/**"
  workflow_dispatch:

jobs:
  stryker:
    name: Stryker Mutation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Run Stryker
        run: npx stryker run
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy-project
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000"

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: frontend/reports/mutation/
          retention-days: 14
