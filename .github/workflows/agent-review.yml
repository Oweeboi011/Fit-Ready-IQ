name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Claude Review
    if: |
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.title, '[skip review]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract diff
        id: diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git diff "origin/${BASE_REF}...HEAD" \
            -- '*.ts' '*.tsx' '*.py' '*.js' \
            ':!*.test.*' ':!*.spec.*' ':!**/coverage/**' \
            ':!**/node_modules/**' \
            > /tmp/pr.diff

          BYTES=$(wc -c < /tmp/pr.diff)
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"

          head -c 10000 /tmp/pr.diff > /tmp/pr_trimmed.diff

      - name: Post AI review
        if: steps.diff.outputs.bytes > 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          TEXT=$(python3 - <<'PYEOF'
          import json, urllib.request, os

          diff = open('/tmp/pr_trimmed.diff').read()
          base_ref = os.environ.get('BASE_REF', 'main')
          api_key  = os.environ.get('ANTHROPIC_API_KEY', '')

          payload = {
            "model": "claude-haiku-4-5-20251001",
            "max_tokens": 1024,
            "system": (
              "You are a senior engineer reviewing a PR for a Next.js 14 + Firebase + Strava "
              "fitness app (TypeScript frontend, FastAPI Python backend). Review for: "
              "1) correctness bugs  2) security issues (credential exposure, injection, broken auth) "
              "3) Firestore security rule gaps  4) TypeScript type-safety regressions  "
              "5) obvious performance problems. "
              "Output a concise markdown list — max 8 bullets. Skip style nits. "
              "If nothing notable, say exactly: No significant issues found."
            ),
            "messages": [{
              "role": "user",
              "content": f"PR targeting {base_ref}. Diff:\n\n{diff}"
            }]
          }

          req = urllib.request.Request(
            'https://api.anthropic.com/v1/messages',
            data=json.dumps(payload).encode('utf-8'),
            headers={
              'x-api-key': api_key,
              'anthropic-version': '2023-06-01',
              'content-type': 'application/json',
            }
          )
          try:
            with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read())
              print(data['content'][0]['text'])
          except Exception as e:
            print(f'_Review service unavailable: {e}_')
          PYEOF
          )

          gh pr comment "$PR_NUMBER" --body "$(printf '### AI Code Review\n\n%s\n\n<sub>Powered by claude-haiku-4-5 · add `[skip review]` to PR title to suppress</sub>' "$TEXT")"
