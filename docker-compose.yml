version: '3.8'

services:
  # Firebase Local Emulator Suite
  firebase-emulator:
    image: andreysenov/firebase-tools:latest
    container_name: fit-ready-iq-firebase
    ports:
      - "4000:4000"   # Emulator UI
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
      - "9199:9199"   # Storage
    volumes:
      - ./firebase.json:/home/node/firebase/firebase.json:ro
      - ./firestore.rules:/home/node/firebase/firestore.rules:ro
      - ./firestore.indexes.json:/home/node/firebase/firestore.indexes.json:ro
      - firebase_emulator_data:/home/node/firebase/.firebase-emulator
    working_dir: /home/node/firebase
    command: >
      firebase emulators:start
      --only firestore,auth,storage
      --project ${FIREBASE_PROJECT_ID:-fit-ready-iq-dev}
      --import=.firebase-emulator/data
      --export-on-exit=.firebase-emulator/data
    environment:
      - FIREBASE_TOKEN=${FIREBASE_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fit-ready-iq-api
    environment:
      - ENVIRONMENT=development
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-fit-ready-iq-dev}
      - FIREBASE_USE_EMULATOR=true
      - FIREBASE_EMULATOR_HOST=firebase-emulator
      - FIREBASE_SERVICE_ACCOUNT_KEY_PATH=${FIREBASE_SERVICE_ACCOUNT_KEY_PATH:-}
      - FIREBASE_SERVICE_ACCOUNT_KEY_JSON=${FIREBASE_SERVICE_ACCOUNT_KEY_JSON:-}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET:-}
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
      - STRAVA_REDIRECT_URI=${STRAVA_REDIRECT_URI}
      - MAPBOX_ACCESS_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      firebase-emulator:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: fit-ready-iq-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MAPBOX_TOKEN=${MAPBOX_ACCESS_TOKEN}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-fit-ready-iq-dev}
      - NEXT_PUBLIC_FIREBASE_USE_EMULATOR=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  firebase_emulator_data:

